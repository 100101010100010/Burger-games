<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netlii | Apps</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        font-family: 'Nunito', sans-serif;
        background-color: #1a1a1a;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover; /* Ensures image is full screen */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #000;
        transition: background 0.3s ease-in-out;
    }

    .glass-panel {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 40px 60px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-align: center;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        width: 90%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.15);
    }

    h1 {
        font-size: 4rem;
        margin: 0;
        letter-spacing: 12px;
        color: #1a1a1a;
        font-weight: 900;
        text-transform: uppercase;
    }

    .time-container { margin: 10px 0 30px 0; }
    .clock { font-size: 3rem; font-weight: 700; color: #1a1a1a; }
    .date { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

    .search-container {
        display: flex;
        align-items: center;
        width: 100%;
        margin-bottom: 40px;
        position: relative;
    }

    .search-bar {
        width: 100%;
        padding: 15px 25px;
        border-radius: 50px;
        border: 3px solid #1a1a1a;
        background: rgba(255, 255, 255, 0.2);
        color: #1a1a1a;
        font-size: 1.1rem;
        outline: none;
    }

    #engine {
        position: absolute;
        right: 15px;
        background: #1a1a1a;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 5px 10px;
        cursor: pointer;
    }

    .shortcuts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
        gap: 15px;
        width: 100%;
    }

    .shortcut {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #1a1a1a;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .shortcut:hover { transform: translateY(-5px); }

    .shortcut-icon {
        width: 50px;
        height: 50px;
        border: 2px solid #1a1a1a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        background: rgba(255,255,255,0.3);
    }

    .shortcut-icon img { width: 24px; height: 24px; border-radius: 4px; }
    .shortcut-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; text-align: center; }

    .quote { margin-top: 30px; font-size: 0.9rem; font-style: italic; opacity: 0.7; }

    .loader {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }
    .loader.show { display: flex; }
    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <div class="glass-panel">
    <h1>NETLII Apps</h1>
    
    <div class="time-container">
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="date">LOADING...</div>
    </div>

    <form class="search-container" id="searchForm">
      <input type="text" id="searchInput" class="search-bar" placeholder="Search the web..." autocomplete="off">
      <select id="engine">
        <option value="https://search.brave.com/search?q=">Brave</option>
        <option value="https://duckduckgo.com/?q=">DDG</option>
        <option value="https://www.google.com/search?q=">Google</option>
      </select>
    </form>

    <div class="shortcuts" id="shortcuts">
      <a class="shortcut" data-url="https://luna.amazon.com">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhvfv_CJ04jTrtXvWnCb59On8zsK590aeK_g&s"></div>
        <span class="shortcut-label">Amazon Luna</span>
      </a>
      <a class="shortcut" data-url="https://youtube.com">
        <div class="shortcut-icon"><img src="https://www.youtube.com/favicon.ico"></div>
        <span class="shortcut-label">YouTube</span>
      </a>
      <a class="shortcut" data-url="https://open.spotify.com/">
        <div class="shortcut-icon"><img src="https://open.spotify.com/favicon.ico"></div>
        <span class="shortcut-label">Spotify</span>
      </a>
      <a class="shortcut" data-url="https://pluto.tv/">
        <div class="shortcut-icon"><img src="https://cdn.theorg.com/a250f7c7-8d93-487f-bc35-69a5e2145115_medium.jpg"></div>
        <span class="shortcut-label">Pluto TV</span>
      </a>
      <a class="shortcut" data-url="https://play.fancade.com">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWGAe4hXcgeS0qdn0vKqjsLqJm1UV0BP2J4A&s"></div>
        <span class="shortcut-label">Fancade</span>
      </a>
      <a class="shortcut" data-url="https://netflix.com">
        <div class="shortcut-icon"><img src="https://images.ctfassets.net/4cd45et68cgf/Rx83JoRDMkYNlMC9MKzcB/2b14d5a59fc3937afd3f03191e19502d/Netflix-Symbol.png?w=700&h=456"></div>
        <span class="shortcut-label">Netflix</span>
      </a>
      <a class="shortcut" data-url="https://amazon.com">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_acIokFYk2PyFtljx2fBacLx22Pv2Lz-fhw&s"></div>
        <span class="shortcut-label">Amazon</span>
      </a>
      <a class="shortcut" data-url="https://discord.gg">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8aMugg7LWDXqkWc-9JlApM4MLPXhi-EPDYA&s"></div>
        <span class="shortcut-label">Discord</span>
      </a>
      <a class="shortcut" data-url="https://www.sling.com/freestream">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTonFPR5r6VY3mjC5fh5Ya3DFPtfaILCCs4IQ&s"></div>
        <span class="shortcut-label">Sling TV</span>
      </a>
      <a class="shortcut" data-url="https://freefy.app">
        <div class="shortcut-icon"><img src="https://play-lh.googleusercontent.com/Fi7laV7yKlxFgUL6rWSmCPigxM68GzHz251hal7B2jZ5jk4tyOAt_HdqrHt3JeVVyw"></div>
        <span class="shortcut-label">Freefy</span>
      </a>
      <a class="shortcut" data-url="https://monochrome.tf">
        <div class="shortcut-icon"><img src="https://monochrome.tf/assets/appicon.png"></div>
        <span class="shortcut-label">Monochrome</span>
      </a>
      <a class="shortcut" data-url="https://chatgpt.com">
        <div class="shortcut-icon"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTX6WwTMvuAaWRh5DH2CjTckKxrR5NmBY2CYg&s"></div>
        <span class="shortcut-label">ChatGPT</span>
      </a>
      <a class="shortcut" data-url="https://github.com">
        <div class="shortcut-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Octicons-mark-github.svg/960px-Octicons-mark-github.svg.png?20180806170715"></div>
        <span class="shortcut-label">Github</span>
      </a>
      <a class="shortcut" data-url="https://disneyplus.com">
        <div class="shortcut-icon"><img src="https://m.media-amazon.com/images/I/719t3jd2NeL.png"></div>
        <span class="shortcut-label">DisneyPlus</span>
      </a>
      <a class="shortcut" data-url="https://open.spotify.com">
        <div class="shortcut-icon"><img src="https://cdn.pixabay.com/photo/2016/10/22/00/15/spotify-1759471_1280.jpg"></div>
        <span class="shortcut-label">spotify</span>
      </a>
      <a class="shortcut" data-url="https://y8.com">
        <div class="shortcut-icon"><img src="https://play-lh.googleusercontent.com/rrFtf3hQpmMUmwHdcsvsV6vNpjMP9wsbvt6PpVg6sUleu0iJrlqVQizckc49dNkFQho"></div>
        <span class="shortcut-label">Y8 Games</span>
      </a>
      

     
    </div>

    <div class="quote" id="quote"></div>
  </div>

  <input type="file" id="bgUpload" accept="image/*" style="display: none;">

  <script>
    const $ = s => document.querySelector(s);
    const bgUpload = $('#bgUpload');

    // Restore Proxy Navigation
    const nav = url => {
      $('#loader').classList.add('show');
      if (window.parent !== window) {
          window.parent.postMessage({ type: 'navigate', url }, '*');
      } else {
          window.location.href = url;
      }
    };

    function loadBackground() {
      const savedBg = localStorage.getItem('customBg');
      document.body.style.backgroundImage = savedBg ? `url(${savedBg})` : "url('./netlii-bg.avif')";
    }
    loadBackground();

    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');
      const uploadBtn = e.target.closest('#uploadBtn');
      const resetBtn = e.target.closest('#resetBtn');

      if (shortcut) {
        nav(shortcut.dataset.url);
      } else if (uploadBtn) {
        bgUpload.click();
      } else if (resetBtn) {
        localStorage.removeItem('customBg');
        loadBackground();
      } else if (addBtn) {
        const name = prompt("Shortcut name:");
        let url = name ? prompt("URL:") : null;
        if (url) {
          if (!url.startsWith('http')) url = 'https://' + url;
          const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
          shortcuts.push({ name, url });
          localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
          renderCustom();
        }
      }
    };

    bgUpload.onchange = e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const imgData = event.target.result;
          document.body.style.backgroundImage = `url(${imgData})`;
          try {
            localStorage.setItem('customBg', imgData);
          } catch (err) {
            alert("Image too large! Try a smaller file.");
          }
        };
        reader.readAsDataURL(file);
      }
    };

    function renderCustom() {
      const container = $('#customShortcuts');
      container.innerHTML = '';
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `<div class="shortcut-icon"><i class="fa-solid fa-link"></i></div><span class="shortcut-label">${s.name}</span>`;
        container.appendChild(div);
      });
    }

    const quotes = ["its like a teeny tiny netlii", "Made by Bubber", "Bro just do your work", "say hi to jimmy for me"];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
    renderCustom();
  </script>
</body>
</html>
